<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Grove dark tile -->
  <rect width="512" height="512" rx="112" fill="#10140E"/>
  <!-- Soft Honey radial wash -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#D8A24F" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#D8A24F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Paw print: 4 toe beans + main pad, Honey filled.
       Centered around (256,275), feels like the dashboard tile but bigger & balanced. -->
  <g fill="#D8A24F">
    <!-- toe beans -->
    <ellipse cx="160" cy="200" rx="36" ry="44"/>
    <ellipse cx="226" cy="156" rx="34" ry="42"/>
    <ellipse cx="298" cy="156" rx="34" ry="42"/>
    <ellipse cx="364" cy="200" rx="36" ry="44"/>
    <!-- main pad: rounded trefoil-like silhouette -->
    <path d="M256 248
             c -52 0 -98 32 -110 78
             c -10 36  12 70  50 80
             c 22  6  40 -8  60 -8
             c 20  0  38 14  60  8
             c 38 -10 60 -44 50 -80
             c -12 -46 -58 -78 -110 -78 z"/>
  </g>
</svg>
